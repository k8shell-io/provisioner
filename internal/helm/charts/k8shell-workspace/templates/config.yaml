apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.__workspace__ }}-k8shelld-config
  namespace: {{ .Release.Namespace }} 
  labels:
    {{- include "workspace.labels" . | nindent 4 }}  
    type: config-init
data:
  config.yaml: |
    # system settings
    system:
      # true to enable profiling
      # if enabled, pprof will be available at localhost:6060
      pprof: false

      # api server 
      apiServer: http://api-server.{{ .Values.__namespace__ }}:9101

    # workspace user
    user:
      username: {{ .Values.__username__ }}
      fullname: {{ .Values.__user__.fullname }}
      uid: {{ .Values.__user__.uid }}
      gid: {{ .Values.__user__.gid }}
      shell: {{ .Values.shell }}
      sudo: {{ .Values.sudo }}

      {{- if .Values.docker.enabled }}
      # supplementary groups
      groups:
        - name: k8shell-docker
          gid: {{ if and (ne .Values.docker.subgid 0) }}{{ add .Values.docker.subgid .Values.docker.groupId -1 }}{{ else }}{{ .Values.docker.groupId }}{{ end }}
      {{- end }}

    {{- if .Values.portForwarding }}
    # port forwarding rules
    portForwarding:
    {{- range .Values.portForwarding }}
      - {{ . }}
    {{- end }}
    {{- end }}

    # reap zombie processes
    reapZombies:
      enabled: true

    # terminate orphaned processes, i.e. processes that were reparented to init (pid 1)
    terminateOrphans:
      enabled: true
      checkInterval: 5
      {{- if .Values.k8shelld.ignoreOrphans }}
      exclude:
      {{- range .Values.k8shelld.ignoreOrphans }}
      - {{ . }}
      {{- end }}
      {{- end }}
    
    # docker settings
    docker:
      createDockerSockSymlink: {{ .Values.docker.enabled }}
