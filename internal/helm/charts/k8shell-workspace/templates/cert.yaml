{{- if .Values.__certmanager__.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.__workspace__ }}-cert
  namespace: {{ .Release.Namespace }} 
spec:
  secretName: {{ .Values.__workspace__ }}-tls
  duration: {{ .Values.__certmanager__.duration }}
  renewBefore: {{ .Values.__certmanager__.renewBefore }}
  commonName: {{ .Values.__workspace__ }}.{{ .Release.Namespace }}.svc.cluster.local
  dnsNames:
    - {{ .Values.__workspace__ }}.{{ .Release.Namespace }}
    - {{ .Values.__workspace__ }}.{{ .Release.Namespace }}.svc
    - {{ .Values.__workspace__ }}.{{ .Release.Namespace }}.svc.cluster.local
  usages:
    - server auth
  issuerRef:
    name: {{ .Values.__certmanager__.issuer.name }}
    kind: {{ .Values.__certmanager__.issuer.kind }}
{{- end }}