{{- $cilium := .Values.network.cilium | default dict }}
{{- if and $cilium.enabled (.Capabilities.APIVersions.Has "cilium.io/v2/CiliumNetworkPolicy") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cilium-np-{{ .Values.__workspace__ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workspace.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      k8shell.io/app: k8shell-workspace
      k8shell.io/organization: {{ .Values.__organization__ }}
      k8shell.io/workspace: {{ .Values.__workspace__ }}
  egress:
    {{- /*
      Unconditional baseline: kube-apiserver is always reachable.
      It lives in RFC1918 space which the standard NetworkPolicy excludes,
      so without this rule kubectl/k8s clients inside the workspace break.
      kube-dns is already covered by the standard NP default.egress rule
      (explicit pod/namespace selector) so it doesn't need to be repeated here.
    */}}
    - toEntities:
        - kube-apiserver

    {{- if $cilium.egressEntities }}
    {{- /*
      Explicit entity list: user names exactly the entities they want (e.g.
      "world", "cluster").  Ports can optionally restrict those entities.
    */}}
    - toEntities:
        {{- range $cilium.egressEntities }}
        - {{ . }}
        {{- end }}
      {{- if $cilium.egressPorts }}
      toPorts:
        - ports:
            {{- range $cilium.egressPorts }}
            - port: "{{ .port }}"
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
      {{- end }}

    {{- else if $cilium.egressFQDN }}
    {{- /*
      FQDN allowlist: restrict internet to specific domains only.
      "world" is intentionally NOT added — unlisted destinations are blocked.
      Defaults to HTTP+HTTPS when egressPorts is not set.
    */}}
    - toFQDNs:
        {{- range $cilium.egressFQDN }}
        - matchPattern: "{{ . }}"
        {{- end }}
      toPorts:
        - ports:
            {{- if $cilium.egressPorts }}
            {{- range $cilium.egressPorts }}
            - port: "{{ .port }}"
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
            {{- else }}
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
            {{- end }}

    {{- else }}
    {{- /*
      No restriction specified: allow full internet (world), matching the
      behaviour that the standard NetworkPolicy provides on non-Cilium clusters.
      egressPorts applies port-level restrictions when set.
    */}}
    - toEntities:
        - world
      {{- if $cilium.egressPorts }}
      toPorts:
        - ports:
            {{- range $cilium.egressPorts }}
            - port: "{{ .port }}"
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
