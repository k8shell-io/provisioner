{{- if and .Values.network (eq .Values.network.networkPolicyClass "isolated") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: np-{{ .Release.Name }}-isolated
  namespace: {{ .Release.Namespace }} 
  labels:
    {{- include "workspace.labels" . | nindent 4 }}  
spec:
  podSelector:
    matchLabels:
      k8shell.io/type: workspace
      k8shell.io/organization: {{ .Values.__organization__ }}
      k8shell.io/workspace: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
{{ include "default.ingress" . | nindent 4 }}
  egress:
{{ include "default.egress" . | nindent 4 }}  
{{- end }}