{{- if eq .Values.betwork.networkPolicy "isolated" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: np-{{ .Values.__workspace__ }}-isolated
  namespace: {{ .Release.Namespace }} 
  labels:
    {{- include "workspace.labels" . | nindent 4 }}  
spec:
  podSelector:
    matchLabels:
      app: k8shell-workspace
      org: {{ .Values.__organization__ }}
      workspace: {{ .Values.__workspace__ }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ssh-proxy 
  egress:
{{- if .Values.network.allowEgress }}
{{- range $cidr := .Values.network.allowEgress }}
    - to:
        - ipBlock:
            cidr: {{ $cidr }}
{{- end }}
{{- end }}
{{ include "default.egress" . | nindent 4 }}  
{{- end }}