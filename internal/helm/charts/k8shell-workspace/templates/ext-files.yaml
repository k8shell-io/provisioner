{{- if .Values.extFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.__workspace__ }}-main-ext-files
  namespace: {{ .Release.Namespace }} 
  labels:
    {{- include "workspace.labels" . | nindent 4 }}  
    type: main-ext-files
data:
{{- range $path, $content := .Values.extFiles }}
  {{ $path | replace "/" "__" | quote }}: |
{{ $content | indent 4 }}
{{- end }}
{{- end }}
{{- if .Values.podman.extFiles }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.__workspace__ }}-podman-ext-files
  namespace: {{ .Release.Namespace }} 
  labels:
    {{ include "workspace.labels" . | nindent 4 }}  
    type: podman-ext-files
data:
{{- range $path, $content := .Values.podman.extFiles }}
  {{ $path | replace "/" "__" | quote }}: |
{{ $content | indent 4 }}
{{- end }}
{{- end }}