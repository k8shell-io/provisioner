{{- $podman := .Values.podman | default dict -}}

apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.__workspace__ }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if .Values.splash }}
    workspace.k8shell.io/splash: {{ .Values.splash | b64enc | quote }}
    {{- end }}
    k8shell.io/manifest-hash: {{ .Values.__manifesthash__ | quote }}
    {{- if .Values.__identity__ }}
    k8shell.io/identity: {{ .Values.__identity__ | quote }}
    {{- end }}
  labels:
    {{- include "workspace.workspaceLabels" . | nindent 4 }} 
spec:
  {{ if .Values.__registry__.regcred }}
  imagePullSecrets:
  - name: {{ .Values.__registry__.regcred }}
  {{ end }}  
  serviceAccountName: {{ .Values.__workspace__ }}-sa
  restartPolicy: OnFailure
  {{- if and .Values.subdomain .Values.hostname }}
  hostname: {{ .Values.hostname }}
  subdomain: {{ .Values.subdomain }}
  {{- end }}

  initContainers:
    #### init container to initialize the workspace
    - name: init-base
      image: {{ include "workspace.k8shelldImage" . }}
      imagePullPolicy: {{ .Values.k8shelld.imagePullPolicy }}
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      command: ["/bin/sh", "-c", "/k8shell/dist/scripts/init-base" ]
      volumeMounts:
        - name: bin-volume
          mountPath: /usr/local/bin

  containers:
    #### main container
    - name: k8shell-main
      image: {{ include "workspace.mainImage" . }}
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        {{- if .Values.capabilities }}
        capabilities:
          add: {{ toYaml .Values.capabilities | nindent 12 }}
        {{- end }}
      command: ["/usr/local/bin/k8shelld"] 
      imagePullPolicy: {{ .Values.imagePullPolicy }}
      resizePolicy:
      - resourceName: cpu
        restartPolicy: NotRequired
      - resourceName: memory
        restartPolicy: NotRequired      

      {{- if .Values.resources }}
      resources:
        requests:
          cpu: "0.1"
          memory: "128Mi"
        limits:
          {{- if .Values.resources.cpu }}
          cpu: {{ .Values.resources.cpu }}
          {{- end }}
          {{- if .Values.resources.memory }}
          memory: {{ .Values.resources.memory }}
          {{- end }}
      {{- end }}

      env:
      - name: IMAGE
        value:  {{ include "workspace.mainImage" . }}
      - name: WORKSPACE
        value: {{ .Values.__workspace__ }}
      - name: BLUEPRINT
        value: {{ .Values.__blueprint__ }}
      - name: USERNAME
        value: {{ .Values.__user__.username }}
      - name: USEREMAIL
        value: {{ .Values.__user__.email }}
      - name: USERFULLNAME
        value: {{ .Values.__user__.fullname }}
      {{- if .Values.env }}    
      {{- range $envName, $envValue := .Values.env }}            
      - name: {{ $envName }}
        value: {{ $envValue }}
      {{- end }}
      {{- end }}
      
      volumeMounts:
      - name: bin-volume
        mountPath: /usr/local/bin/k8shelld
        subPath: k8shelld
        readOnly: true
      - name: bin-volume
        mountPath: /usr/local/bin/kbox
        subPath: kbox
        readOnly: true
      - name: bin-volume
        mountPath: /usr/local/bin/sftp
        subPath: sftp
        readOnly: true
      - name: config-volume
        mountPath: /etc/k8shell
        readOnly: true
      - name: main-volume
        mountPath: /usr/local/k8shell/system
        readOnly: true
      {{- if .Values.storages }}
      {{- range $storageName, $storage := .Values.storages }}
      {{- if and $storage (kindIs "map" $storage) ($storage.enabled | default false) }}
      - name: storage-{{ $storageName }}
        mountPath: {{ $storage.path }}
        readOnly: {{ $storage.readonly | default false }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if .Values.extFiles }}
      {{- range $path, $content := .Values.extFiles }}
      - name: main-ext-files-volume
        mountPath: {{ $path }}
        subPath: {{ $path | replace "/" "__" }}
      {{- end }}
      {{- end }}
      {{- if ($podman.enabled | default false) }}
      - name: podman-sock
        mountPath: /var/run/podman
        readOnly: true
      {{- end }}
      {{- if .Values.__certmanager__.enabled }}
      - name: {{ .Values.__workspace__ }}-cert
        mountPath: /etc/tls/k8shelld
        readOnly: true
      {{- end }}
      - name: identity-token-volume
        mountPath: /run/secrets/identity-token
        readOnly: true
      - name: jwt-verifier-volume
        mountPath: /run/secrets/jwt-verifier
        readOnly: true

    #### podman engine container
    {{- if ($podman.enabled | default false) }}
    - name: k8shell-podman
      image: {{ $podman.image }}
      command:
        - /bin/bash
        - -c
        - |
          #mkdir -p /var/run/podman
          podman system service --time=0 unix:///var/run/podman/podman.sock &
          sleep 2
          chmod 777 /var/run/podman/podman.sock
          wait

      # see https://docs.k8shell.io/concepts/overview/security#least-privileged-workspace-containers
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        appArmorProfile:
          type: Unconfined

      volumeMounts:
        - name: podman-sock
          mountPath: /var/run/podman
        - name: podman-containers-conf-volume
          mountPath: /etc/containers/containers.conf
          subPath: containers.conf
          readOnly: true
      {{- if $podman.extFiles }}
      {{- range $path, $content := $podman.extFiles }}
        - name: podman-ext-files-volume
          mountPath: {{ $path }}
          subPath: {{ $path | replace "/" "__" }}
      {{- end }}
      {{- end }}
    {{- end }}

  ####  list of volumes to mount into the containers
  volumes:
  - name: bin-volume
    emptyDir: {}
  - name: config-volume
    configMap:
      name: {{ .Values.__workspace__ }}-k8shelld-config
      items:
      - key: config.yaml
        path: config.yaml
  - name: main-volume
    configMap:
      name: {{ .Values.__workspace__ }}-files
      defaultMode: 0777
      items:
      - key: README
        path: README
        {{- range $index, $script := .Values.initScripts }}
          {{- range $key, $value := $script }}
      - key: __init_{{ printf "%02d" (add $index 1) }}_{{ $key | replace "&" "__bg" | replace "@" "__flag" }}
        path: __init_{{ printf "%02d" (add $index 1) }}_{{ $key | replace "&" "__bg" | replace "@" "__flag" }}
          {{- end }}
        {{- end }}
  {{- if .Values.storages }}
  {{- range $storageName, $storage := .Values.storages }}
  {{- if and $storage (kindIs "map" $storage) ($storage.enabled | default false) }}
  - name: storage-{{ $storageName }}
    {{- if ($storage.memory | default false) }}
    emptyDir:
      medium: Memory
      sizeLimit: {{ $storage.size }}
    {{- else if eq ($storage.type | default "local") "shared" }}
    persistentVolumeClaim:
      claimName: pvc-{{ $storageName }}{{- if $storage.id }}-{{ $storage.id }}{{- end }}
    {{- else }}
    persistentVolumeClaim:
      claimName: pvc-{{ $.Values.__workspace__ }}-{{ $storageName }}
    {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if $podman.storages }}
  {{- range $storageName, $storage := $podman.storages }}
  {{- if and $storage (kindIs "map" $storage) ($storage.enabled | default false) }}
  - name: storage-podman-{{ $storageName }}
    persistentVolumeClaim:
      claimName: pvc-{{ $.Values.__workspace__ }}-podman-{{ $storageName }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if .Values.extFiles }}
  - name: main-ext-files-volume
    configMap:
      name: {{ .Values.__workspace__ }}-main-ext-files
      items:
        {{- range $path, $content := .Values.extFiles }}
        - key: {{ $path | replace "/" "__" | quote }}
          path: {{ $path | replace "/" "__" }}
        {{- end }}
  {{- end }}
  {{- if ($podman.enabled | default false) }}
  - name: podman-sock
    emptyDir: {}
  - name: podman-containers-conf-volume
    configMap:
      name: {{ .Values.__workspace__ }}-podman-containers-conf
  {{- if $podman.extFiles }}
  - name: podman-ext-files-volume
    configMap:
      name: {{ .Values.__workspace__ }}-podman-ext-files
      items:
        {{- range $path, $content := $podman.extFiles }}
        - key: {{ $path | replace "/" "__" | quote }}
          path: {{ $path | replace "/" "__" }}
        {{- end }}
  {{- end }}
  {{- end }}
  {{- if .Values.__registry__.certCA }}
  - name: podman-ca-cert
    configMap:
      name: registryca
      items:
        - key: registry-ca.pem
          path: registry-ca.pem
  {{- end }}
  {{- if .Values.__certmanager__.enabled }}
  - name: {{ .Values.__workspace__ }}-cert
    secret:
      secretName: {{ .Values.__workspace__ }}-tls
  {{- end }}
  - name: identity-token-volume
    secret:
      secretName: identity-token-{{ .Values.__username__ }}
  - name: jwt-verifier-volume
    secret:
      secretName: jwt-verifier

  {{- if .Values.affinity }}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            {{- toYaml .Values.affinity | nindent 12 }}
  {{- end }}

  enableServiceLinks: false
