name: Build
# See https://github.com/k8shell-io/internals/tree/main/docs/handbook/docs/development/release_and_testing for information on release and testing processes.

on:
  push:
    tags:
      - "v*"

  pull_request:
    branches:
      - "*"
    paths:
      - "docker/**"
      - "internal/**"
      - "pkg/**"
      - "tests/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/*.yaml"

  workflow_dispatch:

env:
  GO_VERSION: "1.24.5"

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write   

jobs:
  Tests:
    runs-on: k8shell-runner
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    env:
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git for private modules
        run: |
          git config --global url."https://${{ secrets.GH_PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binaries
        run: make build

      - name: Run binary smoke tests (test-self)
        run: make test-self

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-reports-go${{ env.GO_VERSION }}
          path: reports/
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/**/*-junit.xml
          check_name: Self-Tests (Go ${{ env.GO_VERSION }})

  Build:
    runs-on: k8shell-runner
    needs: Tests
    if: |
      needs.Tests.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') ||
       (github.event_name == 'pull_request' && github.event.pull_request.draft == false))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git for private modules
        run: |
          git config --global url."https://${{ secrets.GH_PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Determine image tag, version and runtime
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            COMMIT_ID=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            PR_NUMBER=${{ github.event.pull_request.number }}
            IMAGE_TAG="pr-${PR_NUMBER}-${COMMIT_ID}"
            IMAGE_TAG_LATEST="pr-${PR_NUMBER}-latest"
            VERSION="pr-${PR_NUMBER}-${COMMIT_ID}"
            RUNTIME="alpine"
          else
            COMMIT_ID=$(git rev-parse --short HEAD)
            VERSION=$(git describe --tags --match 'v*' | sed 's/-g.*//')
            IMAGE_TAG="$VERSION"
            IMAGE_TAG_LATEST="latest"
            RUNTIME="release"
          fi

          echo "REPO_NAME=$(grep -v '^#' docker/${{ github.event.repository.name }}/BUILD | tail -1)" >> $GITHUB_ENV
          echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG_LATEST=$IMAGE_TAG_LATEST" >> $GITHUB_ENV
          echo "RUNTIME=$RUNTIME" >> $GITHUB_ENV

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Prepare Docker build context
        run: make vendor

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.k8shell.io
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ github.event.repository.name }}/Dockerfile
          target: ${{ env.RUNTIME }}
          tags: |
            registry.k8shell.io/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}
            registry.k8shell.io/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG_LATEST }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT_ID=${{ env.COMMIT_ID }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            "registry.k8shell.io/${{ env.REPO_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: "registry.k8shell.io/${{ env.REPO_NAME }}@${{ steps.build.outputs.digest }}"
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM (keyless)
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "registry.k8shell.io/${{ env.REPO_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Add image info to job summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`registry.k8shell.io/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Runtime:** \`${{ env.RUNTIME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ env.COMMIT_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Signed:** cosign keyless (Fulcio/Rekor)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.k8shell.io/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verify command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify --certificate-identity-regexp '^https://github\.com/k8shell-io/.*\.github/workflows/.*@${{ github.ref }}$' --certificate-oidc-issuer https://token.actions.githubusercontent.com registry.k8shell.io/${{ env.REPO_NAME }}@${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY