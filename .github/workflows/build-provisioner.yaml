name: Build Provisioner Image

on:
  push:
    branches:
      - main
      - v0.11
    tags:
      - "v*"

jobs:
  build-provisioner:
    runs-on: k8shell-runner

    env:
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git for private modules
        run: |
          git config --global url."https://${{ secrets.GH_PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Get version and commit ID
        run: |
          VERSION=$(git describe --tags --match '*' | sed 's/-g.*//')
          COMMIT_ID=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger docs
        run: swag init -g main.go -o ./docs

      - name: Vendor Go modules
        run: |
          go mod vendor
          mkdir -p docker/provisioner/files
          cp -r vendor docker/provisioner/files/

      - name: Copy sources to docker context
        run: |
          cp go.mod go.sum main.go -t docker/provisioner/files/
          cp -r pkg internal docs docker/provisioner/files/
          echo -n "k8shell-base/provisioner:$VERSION" > docker/provisioner/BUILD

      - name: Load REPO_NAME from docker/provisioner/BUILD
        run: echo "REPO_NAME=$(cat docker/provisioner/BUILD)" >> $GITHUB_ENV

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker/provisioner
          tags: ${{ secrets.REGISTRY }}/${{ env.REPO_NAME }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT_ID=${{ env.COMMIT_ID }}
