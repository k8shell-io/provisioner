name: Build Provisioner Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-provisioner:
    runs-on: k8shell-runner

    env:
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git for private modules
        run: |
          git config --global url."https://${{ secrets.GH_PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Get version and commit ID
        run: |
          VERSION=$(git describe --tags --match 'v*' | sed 's/-g.*//')
          COMMIT_ID=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV

      - name: Vendor Go modules
        run: make vendor

      - name: Load REPO_NAME from docker/provisioner/BUILD
        run: echo "REPO_NAME=$(cat docker/provisioner/BUILD):${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.k8shell.io
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/provisioner/Dockerfile
          tags: registry.k8shell.io/${{ env.REPO_NAME }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT_ID=${{ env.COMMIT_ID }}
