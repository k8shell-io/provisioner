name: Self-Tests
# See https://github.com/k8shell-io/internals/tree/main/docs/handbook/docs/development/release_and_testing for information on release and testing processes.

on:
  push:
    tags:
      - "v*"
    paths:
      - "docker/**"
      - "internal/**"
      - "pkg/**"
      - "tests/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/self-tests.yaml"

  pull_request:
    branches:
      - "*"
    paths:
      - "docker/**"
      - "internal/**"
      - "pkg/**"
      - "tests/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/self-tests.yaml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  Self-Tests:
    runs-on: k8shell-runner
    if: github.event_name == 'push' || github.event.pull_request.draft == false

