name: Build Provisioner PR image

on:
  pull_request:
    branches:
      - "*"
    paths:
      - "db/**"
      - "docker/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/build-provisioner-pr.yaml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-pr-image:
    runs-on: k8shell-runner
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    env:
      GO111MODULE: on

    strategy:
      matrix:
        go-version: ["1.24.5"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for version calculation (git describe)
          # Set to 1 if you don't need git history
          fetch-depth: 0

      - name: Set up Git for private modules
        run: |
          git config --global url."https://${{ secrets.GH_PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run self tests
        run: make test-self

      # Calculate version and image tag based on PR or push context
      # PRs: pr-{number}-{short-sha} using actual PR head commit
      # Pushes: git describe output
      - name: Determine image tag and version
        run: |
          # For PRs: use actual PR head SHA, not merge commit
          COMMIT_ID=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          PR_NUMBER=${{ github.event.pull_request.number }}
          IMAGE_TAG="pr-${PR_NUMBER}-${COMMIT_ID}"
          VERSION="pr-${PR_NUMBER}"

          echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Vendor Go modules
        run: make vendor

      - name: Load REPO_NAME from docker/provisioner/BUILD
        run: echo "REPO_NAME=$(cat docker/provisioner/BUILD):${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.k8shell.io
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: registry.k8shell.io/${{ env.REPO_NAME }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT_ID=${{ env.COMMIT_ID }}

      # Add build information to job summary for easy access
      - name: Add image info to job summary
        run: |
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`registry.k8shell.io/${{ env.REPO_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ env.COMMIT_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.k8shell.io/${{ env.REPO_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          