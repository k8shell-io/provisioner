blueprints:
  - name: base
    shell: /bin/sh
    isTemplate: true
    sudo: false

    splash: |
      Welcome to k8shell - cloud-native workspaces on Kubernetes!
      Connected to k8shelld (version: {{.Version}}-{{.Commit}})
      For more information, visit https://k8shell.io

    image: <image:tag>
    imagePullPolicy: IfNotPresent

    subdomain: !cel "user.organization"
    hostname: !cel "user.username + '-' + metadata.name"

    k8shelld:
      image: k8shell-base/k8shelld:pr-50-f512f89
      imagePullPolicy: IfNotPresent
      ignoreOrphans:
        - .*JetBrains.*

    portForwarding:
      - localnetworks:0

    network:
      networkPolicy: system

    resources:
      cpu: 4
      memory: 4Gi

    podman:
      enabled: false
      image: quay.io/podman/stable:v5.8.2

      resources:
        cpu: 2
        memory: 2Gi

      # group owner of podman unix socket
      groupId: 999

      # use the same volumes as in the main workspace
      parentStorages: true

    # list of storages in the workspace
    # storages:
    #   home:
    #     enabled: false
    #     storageClass: ""
    #     size: 10Gi
    #     path: !cel "'/home/' + user.username"
    #     readonly: False

    enableApps: false
