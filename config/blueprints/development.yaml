blueprints:
  # *** Development blueprint template for all git-based workspaces ****
  - name: development
    template: base
    isTemplate: true
    description: git repository blueprint with development tools and configurations

    resources:
      cpu: 8
      memory: 8Gi

    podman:
      enabled: true

      resources:
        cpu: 8
        memory: 8Gi

      # use the same volumes as in the main workspace
      parentStorages: true

      # podman graph storage configuration
      # storages:
      #   graphdb:
      #     enabled: true
      #     storageClass: zfs-localpv
      #     size: 5Gi
      #     path: "/home/podman/.local/share/containers/storage"
      #     readonly: False

    # list of storages in the workspace
    storages:
      home:
        enabled: true
        type: local
        path: !cel "'/home/' + user.username"
        readonly: False
        claimSpec:
          storageClassName: !cel env("WORKSPACE_STORAGE_CLASS")
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 10Gi
        claimSpecAnnotations:
          zfs-csi.k8shell.io/volume-name: !cel "workspaceName"
          zfs-csi.k8shell.io/retain-on-delete: "false"
          zfs-csi.k8shell.io/squash: "all_squash"
          zfs-csi.k8shell.io/squash-uid: !cel "user.uid"
          zfs-csi.k8shell.io/squash-gid: !cel "user.gid"

      shared:
        enabled: true
        id: !cel "metadata.repoOwner"
        type: shared
        path: /opt/shared
        readonly: False
        claimSpec:
          storageClassName: !cel env("WORKSPACE_STORAGE_CLASS")
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Gi
        claimSpecAnnotations:
          zfs-csi.k8shell.io/volume-name: !cel "metadata.repoOwner + '/shared'"
          zfs-csi.k8shell.io/retain-on-delete: "true"
          zfs-csi.k8shell.io/squash: "all_squash"
          zfs-csi.k8shell.io/squash-uid: !cel "user.uid"
          zfs-csi.k8shell.io/squash-gid: !cel "user.gid"

    initScripts:
      - name: workspace 
        script: |
          ln -s /opt/shared $HOME/shared

  # **** General development blueprint ****
  - name: dev
    template: base
    description: |
      A blueprint for a general development workspace which includes a preconfigured development environment with tools such as Docker and VS Code Server.
    image: workspaces/dev:1.12

    k8shelld:
      # image: k8shell-base/k8shelld:pr-56-8f0dd5e
      connection:
        allowAnyNS: true
        allowAnySA: true

    network:
      networkPolicyClass: system

    resources:
      cpu: 8
      memory: 16Gi

    securityContext:
      capabilities:
        add: ["SYS_PTRACE"]

    podman:
      enabled: true
      # securityContext:
      #   runAsUser: 0
      #   runAsGroup: 0
      #   privileged: true
      # extFiles:
      #   /etc/containers/containers.conf: |
      #     [containers]
      #     log_driver = "k8s-file"
      #     [engine]
      #     cgroup_manager = "cgroupfs"
      #     events_logger="file"
      #     runtime="crun"
      resources:
        cpu: 8
        memory: 8Gi
      parentStorages: true
      storages:
        graphdb:
          enabled: true
          path: "/home/podman/.local/share/containers/storage"
          fsOwnerUid: 1000
          fsOwnerGid: 1000
          readonly: False
          claimSpec:
            storageClassName: zfs-localpv
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

    storages:
      home:
        enabled: true
        type: local
        path: !cel "'/home/' + user.username"
        readonly: False
        claimSpec:
          storageClassName: !cel env("WORKSPACE_STORAGE_CLASS")
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 10Gi
        claimSpecAnnotations:
          zfs-csi.k8shell.io/volume-name: !cel "workspaceName"
          zfs-csi.k8shell.io/retain-on-delete: "false"
          zfs-csi.k8shell.io/squash: "all_squash"
          zfs-csi.k8shell.io/squash-uid: !cel "user.uid"
          zfs-csi.k8shell.io/squash-gid: !cel "user.gid"

    # initScripts:
    #   - name: workspace
    #     script: |
    #       # set up the workspace for development
    #       mkdir -p $HOME/workspace

    enableApps: true
    apps:
      vscode:
        enabled: true
        autoStart: true
      # jupyter:
      #   enabled: true
