blueprints:
  - name: dev
    template: base
    image: workspaces/dev:1.12
    shell: /bin/bash
    sudo: true

    resources:
      cpu: 8
      memory: 4Gi

    storages:
      home:
        enabled: true
        path: !cel "'/home/' + user.username"
        readonly: false
        claimSpec:
          storageClassName: !cel env("WORKSPACE_STORAGE_CLASS")
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 10Gi

    docker:
      enabled: true

  - name: ubt
    template: dev
    image: docker.io/ubuntu:latest
    shell: /bin/bash

  - name: cos
    template: dev
    image: docker.io/centos:8
    shell: /bin/bash

  - name: alp
    template: dev
    image: docker.io/alpine:latest
    docker:
      enabled: true

  - name: bsb
    template: dev
    image: docker.io/busybox:latest
    docker:
      enabled: false
    sudo: false

  - name: jup
    template: dev
    image: docker.io/jupyter/base-notebook:latest
    docker:
      enabled: false
    sudo: true
