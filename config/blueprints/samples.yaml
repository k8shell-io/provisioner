blueprints:
  - name: docker
    template: base
    image: docker.io/docker:24-cli

    env:
      DOCKER_HOST: "unix:///var/run/podman/podman.sock"

    podman:
      enabled: true
      createDockerSockSymlink: false

  - name: ubuntu
    template: base
    image: docker.io/ubuntu:latest

  - name: alpine
    template: base
    image: docker.io/alpine:latest
