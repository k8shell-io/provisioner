# Provisioner service configuration

# Namespace for the k8shell workspace
targetNamespace: workspaces-staging

# Namespaces where workspace injection is allowed.
# If omitted or empty, injection is disabled and all inject requests are rejected.
# Use explicit namespace names for Role-scoped operation.
# When you use ["*"] cluster-wide discovery/injection is required (ClusterRole).
injectNamespaces:
  - k8shell-test

clusterDomain: cluster.local

defaultRegistry:
  host: ${WORKSPACE_REGISTRY}
  # certCA: !file ${SECRET_FILES}/private_ca.pem
  username: !file ${SECRET_FILES}/registry_username
  password: !file ${SECRET_FILES}/registry_password

k8shellCapabilities:
  apiServerEnabled: true

  # Service account token credential helper configuration
  # Controls whether k8shelld uses the API server to retrieve SA tokens for workspace Kubernetes access
  saToken:
    # enabled controls whether the SA token credential helper is active
    enabled: false
    # cacheTokens controls whether retrieved tokens are cached to avoid redundant API server calls
    cacheTokens: false

  # Shell session configuration
  # Controls behavior of PTY shell sessions in k8shelld workspaces
  shells:
    # How long a detached PTY shell session is kept alive before automatic termination
    # Accepts Go duration strings (e.g. "30m", "1h", "24h")
    # Default: "30m" (set by k8shelld if omitted)
    # Set to "0s" to disable automatic termination
    detachedTTL: "30m"
    
    # Allow clients to set unlimited TTL for detached sessions
    # Default: false
    allowUnlimittedTTL: false
    
    # Allow clients to detach from PTY shell sessions
    # Default: false
    allowSessionDetach: false

certManager:
  enabled: false
  issuer:
    name: vault-root-issuer
    kind: ClusterIssuer
  duration: 24h
  renewBefore: 12h

# grpc server
grpc:
  port: 9030
  enableTLS: false
  certFile: /opt/shared/provisioner/tls/tls.crt
  keyFile: /opt/shared/provisioner/tls/tls.key

  # JWT required claims for authentication
  authEnabled: false
  audience: provisioner
  allowed:
    - serviceAccount: ssh-proxy
    - namespace: k8shell-test
      serviceAccount: ssh-proxy
    - namespace: k8shell-test
      serviceAccount: api-server
    
# NATS configuration for event streaming
nats:
  enabled: true
  url: nats://nats.k8shell-test:4222
  username: k8shell-service
  password: ${TOKEN_PROVISIONER}
  kv:
    # TTL for provision jobs in the NATS KV store
    provisionBucketTTL: 48h

# Identity service configuration
identity:
  address: identity.k8shell-staging:9020 #identity.k8shell-test:9020
  tokenFilePath: /opt/shared/provisioner/identity-token
  # caCertPath: /opt/shared/auth/ca.crt
  # serverName: identity.k8shell-test.svc

# Identity JWT verifier configuration
# Used to validate user identity tokens
jwtVerifier:
  signingMethod: es256
  privateKeyFile: /opt/shared/identity/secrets/jwt_private.pem

# Blueprints configuration
blueprints:
  directory: blueprints

  # Default blueprint to use when a custom blueprint userstr is requested but
  # the identity service returns not-found (e.g. user has no custom blueprint stored).
  # Leave empty to return an error instead of falling back.
  # defaultCustomBlueprint: default

