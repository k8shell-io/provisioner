syntax = "proto3";

package provisioner;

option go_package = "github.com/k8shell-io/provisioner/pkg/api/provisionerpb;provisionerpb";

import "common/pkg/gapi/common.proto";

// *** Provisioner service

service ProvisionerService {
  rpc GetWorkspaces (GetWorkspacesRequest) returns (GetWorkspacesResponse);
  rpc FindWorkspace (FindWorkspaceRequest) returns (common.WorkspaceStatus);
  rpc ProvisionWorkspaceStream (ProvisionWorkspaceRequest) returns (stream ProvisionEvent);
  rpc UpgradeWorkspace (UpgradeWorkspaceRequest) returns (UpgradeWorkspaceResponse);
  rpc UpgradeWorkspaceResources (UpgradeWorkspaceResourcesRequest) returns (UpgradeWorkspaceResponse);
  rpc DeleteWorkspace (DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
}

message FindWorkspaceRequest {
  string workspace = 1;
}

message GetWorkspacesRequest {
  string workspace = 1;
  string username = 2;
  string organization = 3;
  string blueprint = 4;
  string repo_name = 5;
  string repo_owner = 6;
  string repo_ref = 7;
}

message GetWorkspacesResponse {
  repeated common.WorkspaceStatus workspaces = 1;
}

message ListWorkspacesRequest {
  string username = 1;
  string blueprint = 2;
}

message ListWorkspacesResponse {
  repeated common.WorkspaceInfo workspaces = 1;
}

message ProvisionWorkspaceRequest {
  string userstr = 1;
  int32 timeout = 2; 
  bool sendProgress = 3;
  bool sendEvents = 4;
}

message ProvisionWorkspaceResponse {
  string status = 1;
  string message = 2;
}

message UpgradeWorkspaceRequest {
  string workspace = 1;
  bool force = 5;
}

message UpgradeWorkspaceResourcesRequest {
  string workspace = 1;
  string cpu = 2;
  string memory = 3;
}

message UpgradeWorkspaceResponse {
  string status = 1;
  string message = 2;
}

message ProvisionEvent {
  string type = 1; 
  string timestamp = 2;
  string object_name = 3;
  string status = 4; 
  string message = 5;
}

message DeleteWorkspaceRequest {
  string workspace = 1;
  uint32 delay_seconds = 2;
}

message DeleteWorkspaceResponse {
  string message = 1;
}
